# =========================
# SERVER CONFIGURATION
# =========================
server:
  port: ${PORT:8080}
  tomcat:
    tld-scan-and-meta-inf-annotations: false

# =========================
# FIREBASE CONFIGURATION
# =========================
firebase:
  config:
    json-credentials: classpath:firebase-config.json

# =========================
# DATABASE CONFIGURATION (POSTGRESQL & FLYWAY)
# =========================
spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/barbearia?sslmode=disable}
    username: ${DB_USER:postgres}
    # 🔒 PROTEGIDO: Sem senha real escrita aqui. O sistema vai ler a variável DB_PASSWORD do seu sistema.
    password: ${DB_PASSWORD:senha_local_teste}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:validate}
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

# =========================
# SECURITY (JWT)
# =========================
jwt:
  # 🔒 PROTEGIDO: Uma chave genérica apenas para o Git não reclamar nos testes locais.
  secret: ${JWT_SECRET:chave_secreta_padrao_para_testes_locais_de_256_bits}

# =========================
# DEVELOPMENT CONTROL
# =========================
dev:
  owner:
    key: ${DEV_OWNER_KEY:chave_local_teste}