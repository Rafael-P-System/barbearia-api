# =========================
# SERVER CONFIGURATION
# =========================
server:
  port: ${PORT:8080}

# =========================
# DATABASE CONFIGURATION (POSTGRESQL)
# =========================
spring:
  datasource:
    # Prioriza a variável do Render. Se não houver, usa o localhost (seu PC)
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/barbearia}
    # Usa a variável de ambiente DB_USER ou 'postgres' como padrão
    username: ${DB_USER:postgres}
    # Usa a variável de ambiente DB_PASSWORD
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    # 'update' sincroniza o banco com suas classes Java
    hibernate:
      ddl-auto: update
    show-sql: true 
    properties:
      hibernate:
        # O dialeto é detectado automaticamente para Postgres
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

# =========================
# SECURITY (JWT)
# =========================
jwt:
  # Chave secreta protegida por variável de ambiente
  secret: ${JWT_SECRET}
  # Expiração de 24 horas (em milissegundos)
  expiration: 86400000

# =========================
# DEVELOPMENT CONTROL
# =========================
dev:
  owner:
    key: ${DEV_OWNER_KEY}